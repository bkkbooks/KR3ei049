body:
  text: 卷上胎前惡阻噁心頭眩惡食擇食是也懷娠兩月宜絶醫藥妊娠一月足厥陰脈養之二月足少陽脈養之多致噁心頭眩喜酸俗為之病兒非醫藥所治治之則愈甚待其自安可耳懷娠一月不須安胎胎未成而嘔吐母病也若注意安胎便用砂芩之類則反傷脾胃故但當治其母病則嘔逆自止惟方藥有與病相合而於胎不相宜者當去之中氣不運孕當兩三月因中氣多滯不能運化不思穀味聞食即噁心多阻宜疏理脾胃香砂六君子湯和三加烏梅亦可稟受怯弱氣血不足轉致內郁鬱氣上衝於胃則嘔逆血虛而心失所養則煩悶宜調血散郁為主參橘飲和一甚有虛弱之極或作寒熱往來倦怠不能自支此肝腎不足也須兼補足厥陰與足少陰經胃有痰飲血壅不行則飲隨氣上停滯肝經故喜酸物惟金能剋木宜以辛味勝之砂仁藿香自不可少半夏雖損胎不妨權用但不宜多耳半夏茯苓湯可酌用之和二胃氣虛寒宜溫補脾胃以下其逆氣六君子湯補一肝火沖胃寅卯時覺少腹有氣上衝此肝火挾衝脈之火上衝也故心中煩憒熱悶嘔逆不止宜竹茹麥冬湯寒一氣鬱傷肝大怒後肝氣挾胎氣上逆也故胸滿眩暈而吐逆宜疏肝不宜補氣抑青丸可治散一外傷風寒嘔而頭暈亦有兼風寒外襲者宜於調氣之中加紫蘇以散之虛則可投參蘇二味上實下虛惡阻若兼腰痛謹防胎墮宜六君合四物去川芎加川斷杜仲以安之切勿用升舉藥愈升則上愈實而下愈虛是促其墮矣補一補七嘔吐不受藥津液燥涸少陰虛火上浮厥陰鬱火上達少陽伏火上乘是以嘔吐不能受藥也速當救急以治其標滋陰清燥湯寒一子煩煩症有四肺虛而火乘之心煩也停痰積飲惡聞食氣胸中煩也但熱而煩虛煩也氣鬱不舒頻吐涎沫胎動不安子煩也心肺虛熱陰既養胎孤陽獨旺心肺虛熱故煩宜清心肺心驚膽怯受胎後血氣壅鬱熱氣上衝心肺故煩悶不安心膽俱怯竹葉安胎飲犀角散腎火動六味地黃丸和四寒三補二停痰積飲氣鬱不舒以致嘔吐涎沫劇則胎動竹葉湯寒四麥冬飲寒五津液枯燥臟腑氣虛營衛不和致陰陽偏勝而熱入心脾也知母丸寒六知母飲寒七脾腎氣虛而火鬱逍遙散加黃芩砂仁和五胎氣上逼氣逆脹悶清肝飲散二上焦氣鬱鬱則為火而中氣不和分氣飲和六暴渴不止血欲凝而渴非疾也飲五味子汁自愈君火乘肺盛夏君火大行上乘肺金以致煩躁胎動不安宜清心火子懸胎氣不和上湊心腹致脹滿痞悶疼痛不安濁氣上衝而心腹痛宜疏氣舒郁紫蘇飲散三胎熱氣逆孕在三月君相二火養胎致胎熱衝心而痛紫蘇飲散三若胎上攻心不知人事宜調中和氣飲寒八寒飲與氣相爭腹有寒氣小腹如扇惡寒喜熱子宮寒也附子湯可權用之熱一然脈果遲細方無有誤子腫氣壅成濕濕氣上行面目故腫子腫腫在頭面子滿腫在遍體子氣腫在下體脾胃氣虛土氣不和不能制水水氣不化停積於中而溢於外則腫白朮散和十八六君子湯補一感犯風寒紫蘇飲去白芍加防風散三濕痰壅滯六君子湯補一黑山梔一合米飲下血少氣滯加味歸脾湯補三子滿心胸脹滿氣不舒展或至遍身浮腫喘急不安水血相搏土不剋水水與血相搏散於四肢遂致遍身腫滿少腹急而溲不利鯉魚湯澤瀉散和七瀉一濕熱腫於下部補中益氣湯加山梔茯苓補六傷食吐瀉六君子湯加砂仁穀芽補一脾虛胃弱四君子湯加訶子薑皮補四風邪外襲紫蘇飲去人參白芍加藿香散三子氣因素有風濕妊娠三月後兩腳面浮腫行走艱難喘悶似水氣狀腳指縫黃水出謂之子氣切勿作水病治至分娩自消中氣不得升發當疏理鬱滯天仙藤散散五下元虛弱而兼風邪宜生血行氣烏藥順氣湯加減用之散六子喑舌為心苗肺主聲音肺腎為子母之臟心肺腎三臟皆能致喑如妊娠九月而喑則以胞之絡脈系腎少陰之脈貫腎上系舌本脈絡阻滯故有言無聲分娩後自然聲出不必治心火克肺宜降少陰之火心腎不足宜補少陰痰涎滯絡宜清痰飲子癇忽然昏冒不知人事甚則角弓反張須臾自醒良久復作此由血虛而外邪襲之也血燥類中風宜清熱養血加味羚羊角散寒九又忽然昏迷倒地者乃血氣養胎母乏精力以致眩僕只宜飲食以補之水衰火旺當瀉南補北使肝火平和六味加歸芍補二外感風寒憎寒壯熱頭疼煩悶宜芎蘇散散七伏熱在內懷孕後多臥熱褥乃食熱物或服峻補之劑致令熱伏胎中旋挾肝臟風熱攻壅入腦則頭暈昏迷宜服天冬飲子寒十胃中濕痰有濕痰則血氣壅祕癱瘓不能舉動宜烏藥順氣湯以發其汗散六風火相煽鉤藤湯加黃芩梔子柴胡痰湧加竹瀝風盛加全蟲氣血虛用八珍湯加鉤藤梔子煩熱多加叉斛散八補五若無力而抽搐汗出如油汗絶也不治胎氣傷於熱毒頭眩眼花腮項暴腫成核痛甚嘔吐若加痰壅危在頃刻急投消風散散三十三藥毒攻胎上衝心腹口不能言項直自汗身熱與子癇相似六脈浮數十不一生速用生白扁豆一味研末汲井水灌之子淋氣血養胎不及宣通滲道遂使膀胱鬱熱不化而為淋法當養血為主兼利小便肝經濕熱龍膽瀉肝湯寒十一血虛生熱安榮散補八血得熱而溢於脬勞傷經絡熱生於內熱盛血溢故血隨溺中出也宜養血安胎四苓加阿膠瀉二腎虛不能制水虛則熱客於膀胱地膚子湯又四物湯加知柏玄參麥冬北五味瀉三補七臍腹脹痛脾胃氣虛也安胎飲加二陳湯補九和八肺氣虛而溲短補中益氣湯加山藥麥冬補六服滲濕之劑而益加頻數或澀而不利四物湯加知母川柏懷牛膝茯苓甘草補七腿足轉筋左歸飲加當歸菟絲子製附子補三十三胎壓膀胱六脈細弱氣血俱虛不能承載其胎也補中益氣湯升舉其胎則小便自利若利小便胎墮而死補六子嗽津血養胎肺乏濡潤兼之鬱火上炎故嗽不止法當潤肺為主胃火沖肺食生冷又食椒薑致傷胎氣而咳嗽不止五虎湯和七脾肺氣虛傷於風寒補中益氣湯加桑皮杏仁桔梗補六肺虛不生水水虛而火炎宜清金滋水又當以安胎為要陰火克肺天冬湯寒十二風寒客肺寧肺飲寒十三嗽血不止清肺飲寒二十七子瘧其母素有肝火遇孕則水養胎元肝血愈燥寒熱往來是以不免似瘧實非瘧也或因氣血虛損風寒乘之風為陽邪化氣為熱寒為陰邪化氣為寒陰陽並挾寒熱互見宜大補氣血輕表外邪若寒熱不已熏蒸其胎胎必傷矣肝枯發火逍遙散和五化源不足六味丸補二氣虛寒熱六君子湯去半夏加藿香補一陰陽之氣不和宜和解小柴胡湯和十心腹痛臟腑既虛外觸風寒邪正相擊而並於氣隨氣上下衝於心則心痛攻於腹則腹痛若至久不瘥衝於胞胎則胎下腹痛惡寒少腹如扇子宮受寒而不能合故開而若扇宜附子湯熱一血脹腹痛此子宮久虛也不速治則胎墮杜仲丸補十痛引兩脅小便數大便滑宜安胎和氣飲和十一微痛連腰飲食無味此胎氣不安也宜安胎飲補九痛不可忍胎動欲落若初病而身體強健者可用紋銀數兩先煎後加茅根二斤煮汁飲之氣脹刺痛腸鳴嘔逆此岔怒憂思過度飲食失節所致宜木香散若氣鬱生火加清火之味散九胞阻腹痛血為胞所阻不能流行血滯則氣亦滯故腹中痛宜四物加膠艾甘草挾風則為濁痰阿膠能去風而澄濁艾能導血歸經補七脾胃氣虛不能承載安胎飲加升麻白朮或補中益氣湯補九補六忽然㽱痛此妊娠至五六月有之大棗十四枚炒炭食鹽一錢炒赤共研酒下頓僕胎動腹痛下血四物加膠艾不應用八珍加膠艾或再加知母亦可若搶心短氣腹滿作痛四物加阿膠砂仁陳皮黃芩補七補五風邪痰飲交結於心之支絡宜四物合二陳加藿香紫蘇或阿膠散加旋覆花或當歸芍藥湯擇而用之補七和八補六十三補十一腹痛連髖宜五加皮散或五加皮丸散十散十一皮膚疼痛筋骨拘急手足攣拳此內食生冷外受風寒寒冷之氣內外相搏而胎不安也宜安胎和氣飲和十一筋骨疼痛四肢不安因怪夢多驚或喧呼忪悸以致胎氣不安故兩脅腹脹連臍急痛坐臥不寧氣促如喘速投大聖散補十二腹痛時作小腹重墜血虛氣陷也用加味安胎飲補十三宿寒搏血血凝氣滯宜五靈脂蒲黃並炒炭醋調下或用五君子湯補十四遍身痛衝心欲死不能飲食宜白朮芍藥黃芩心下滿氣急切痛赤茯苓桑白皮前胡郁李仁蘇梗五加皮血虛而熱生地二斤搗汁和酒一升煎半服胎氣自痛宜內補丸補十五胞絡虛而風寒搏之少腹痛甚紫蘇飲加生薑如氣血兩虛八珍湯可加減用之散三補五氣攻左右小便不利小柴胡湯加青皮梔子和十因怒而小腹疼痛水道重墜肝火熾盛所致龍膽瀉肝湯後用四君加升柴寒十一補四小腹痛連腰脅此驚惱所致也甚則下血不止宜阿膠當歸人參茯苓加香附艾並炒炭煎服腰脅痛血氣蔭胎不能養腎腎虛而腰必痛或勞力傷腎致動胞系痛甚而胞系必脫又房事不節胞系傷而痛不止遂至胎墮者多矣宜安胎為主腎氣虛弱青娥丸加熟地八珍湯加杜仲阿膠艾砂仁補十六補五氣血滯而不行縮砂飲紫蘇飲加桔梗香附散十二散三風邪所乘此必腰痛如折紫酒或四物湯加桑寄生防風補十七補七閃挫而痛通氣散加安胎飲補十八補九肝火熾盛小柴胡湯加左金丸和十寒十四天陰及久坐而痛濕熱也二妙散加杜仲米仁和四十四腰重如帶冷物寒濕也通氣散加川斷杜仲補十八肝脾鬱結歸脾湯加柴胡加左金丸補十九寒十四下血衝任二脈上為乳汁下為月水受胎則月水應斷衝任氣虛不能固攝血常溢下名曰胞漏莫作月水論久而不止則胎墮非時而下為胎漏依期而漏號激經尿血溺時方有胞漏血常下而不停見紅腰痛六味丸合四君子湯去甘草加杜仲川斷黏米補二補四榮血有風榮經為風所勝故經血動而下也所下者本非養胎之血若認作胎漏服保養胎元之藥是實實矣胎必墮下宜服防風丸散十三按月出血點滴為胎漏此因氣血並虛也宜服補中安胎飲補二十因事而動以至下血二地加枳殼炭二三分頓僕動胎下血不止安胎飲加阿膠艾炒炭如感寒頭痛加蓮鬚補九胎氣內熱迫血妄行涼胎飲寒十五中氣下陷補中益氣湯補六脾氣虛不能攝血歸脾飲補十九肝脾鬱怒加味歸脾湯或小柴胡湯補三和十肝脾風熱加味逍遙散補二十一肝脾濕熱升陽除濕湯散十四風入腸胃胃風湯散十五胎急不安下血不止桑寄生散和十二因驚而氣虛虛則下陷而見血安胎飲加人參補九血離其位積於胞宮為脹為痛四物重加當歸補七下黃汁如膠或如豆汁此濕熱也用升陽除濕湯又用黃耆六兩糯米五合水五升煎半分作兩服散十四症氣相妨亦為漏下行經之時血虛而寒氣乘之血遂凝結而成症其症不結於子宮仍能行經成孕既孕見血為之漏下是症氣為害也宜下之桂枝茯苓湯然方中桃仁一味恐妨胎須酌用若症在腹中於胎無害俟分娩後治之為妥散十六尿血胎漏血自人門出尿血血從尿門出因心經有火移於小腸滲入膀胱溺時而下不溺則不下也形體勞而過食燔炙之物加味逍遙散補二十一赤帶漏下如豬肝汁側柏丸寒十六轉胞胞即膀胱以胎漸長大下逼於胞胞為胎逼而側故名轉胞有因胎陷而致轉胞者有因氣不化水水蓄胞中胎又從而逼之而致轉胞者其候煩悶汗出氣逆奔迫水道不通小腹急痛宜速治之急則令孕婦仰臥床上豎起兩足亦能稍瘥轉胞與子淋相類但淋則痛而不脹轉胞則脹而不痛即因脹極而痛溺孔卻不痛也若淋症則小便點滴溺孔痛甚如割血氣虛弱胎不能舉補中益氣湯加減用之八珍湯加廣皮木香亦治此症補五補六脾肺氣虛不能輪泄膀胱異功散加豬苓澤瀉補二十二熱氣鬱結膀胱以致津液不利滋腎丸加丹皮澤瀉寒十七金為火爍脾土濕熱致溲便不利清金利水湯加山梔叉斛寒十八忍尿飽食房勞氣逆而水不能化以致轉胞宜治其氣蘇香丸散十七胎氣上逼胎動氣逆上逼心肺以致氣寒不轉悶亂喘促此調養失宜氣血不和也子懸是胎氣不和此因氣血不調以致胎動不安也胎氣上逆紫蘇飲散三當歸芍藥湯補十肝火內熱加味逍遙散補二十一胃火上逆四物湯去川芎加山梔黃芩甘草補七脾氣不舒加味歸脾飲補三飲食無味六君子湯補一脾胃虛寒五君子湯補十四風邪勝喘不能臥參蘇飲和十三火動其胎逆上作喘黃芩香附末用砂仁煎湯下腎氣不歸元上乘於肺而作喘生脈散都氣飲加阿膠補二十三補二十四胎氣上逼熱痛下血以致煩悶困篤蔥二十莖濃煎飲之胎死即下未死即安臟躁因氣血養胎津液不能充潤而肺躁也當補其母肺躁欲哭數欠伸甘草大棗湯補二十五八珍湯補五淡竹茹湯寒十九寒水攻心而悲淚五君子湯加砂仁補十四肺受風邪頻致淚下四物寄生湯和十四胎動胎動則腹痛胎漏無腹痛胎動宜行氣胎漏宜清熱若手足冷厥唇口青黑宜人參甘草當歸阿膠蓮鬚蔥白胎動作喘宜降火用黃芩香附末清湯下腹痛下黃汁黃耆川芎黏米煎服衝任風寒以致胎動當歸川芎紫蘇生薑煎服元氣不足怠倦不能承載宜服安胎調氣飲補二十六如微熱腰痛連進兩服怒氣傷肝鬱結不舒觸動血脈而胎不能安宜安胎飲加香附柴胡白芍補九有火加梔子丹皮因母病而胎動但治母病不必安胎惟犯胎之藥不可入其餘飲酒房勞觸忤僕傷以致胎動俱當安胎為主胎動下血蔥白煎湯入阿膠艾炭再煎服又當歸川芎阿膠艾黃芩甘草煎服胎動腹痛面青冷汗氣欲絶此勞動傷胎宜急治之鉤藤湯散八胎不動不墜腹冷如冰血少不能榮養其胎也宜補血湯補二十七胎痛血少不能榮養其胎也血衰氣滯宜抑陽助陰四物湯加香附紫蘇補七小腹重墜地黃當歸參朮陳皮四君子湯補四補中益氣湯加歸地補六亦治胎脹孤漿懷孕六七月暴下漿水斗余胎亦必從而墮此元氣虛而血傷也胎動腹痛忽下黃汁如膠或如豆汁宜黃耆糯米湯補二十八吐血氣血壅養胎元六淫七情皆足以動其血氣氣逆而火上乘之故血溢於口但火有虛焰實熱之分治有清火補水之異若以尋常治血之法行血消血動用四物胎必墮矣火從胎氣上升載血而出生地麥冬白芍黃芩阿膠蒲黃炭香附炭肝經風熱防風黃芩肝經怒火小柴胡湯去半夏加山梔生地或投加味消遙散和十補二十一傷寒全以清熱安胎為主然安胎而仍用參術等味則邪熱固閉反致胎下只要隨症用藥勿犯胎氣始為合法惡寒頭痛邪在表也宜香蘇散散十八若煩渴則邪在半表半裡黃龍湯和十五發熱躁渴溲赤便閉或下利赤水邪在裡也三黃解毒湯寒二十熱極斑如錦紋四物湯去川芎加黃芩玄參知母大青葉補七壯熱百節痛宜柴胡葛根黃芩山梔知母大青熱結於胃胸口煩悶宜涼膈滋陰丸寒二十一汗下後熱不止宜加味竹葉湯寒二十二病熱而嘔不食而煩宜蘆根清胃飲寒二十四下後脅熱利不止黃芩湯寒二十四斑赤黑小便如血氣斷如絶胎落而未落宜用梔子黃芩生地青黛葛根升麻杏仁蔥白煎湯速服之心驚發熱辰砂安神丸補二十九心氣虛不能主血補心湯補三十胃經火動犀角地黃湯寒二十五肺受火克清肺飲寒二十七膏粱積熱加味清胃散寒二十六腎水虧而陰火動加味六味丸補五十吐衄口噤項強類中風加味安胎飲補三十口鼻出血血熱沖傷胞絡也治當涼胎為主衄血湯寒二十九痢疾後重不可降氣便膿不得行血惟順氣和血佐以導滯消積之味此治妊娠痢疾之要法也腹脹而痛裡急後重三黃解毒湯加木香當歸寒二十血痢不止熱乘大腸也黃芩芍藥甘草腹重墜下元氣虛也胎動不安內熱甚也補中益氣湯加黃芩白芍補六痢下黃水脾氣下陷也補中益氣湯補六黃而兼青肝木剋土也宜平肝補土補中益氣湯加白芍青皮補六黃而兼黑水反侮土也宜補脾腎七味丸補三十一肉桂有礙於胎可易肉果菟絲子然火盛者亦兼黑色宜投寒涼之劑腸胃虛弱風邪客之胃風湯散十五赤白膿血不止黃連湯寒二十八赤白灰色泄痢痛欲死大寧散澀一腹痛胸滿當歸芍藥湯補十一腸鳴後重穀道疼痛蒙薑黃連丸和十六胎氣不和相火上炎鬱而為熱亦致下利不止似痢而實非痢也四物湯加黃芩白朮生地補七泄瀉血壅胎元則脾陰虛不能運化水穀而為泄瀉又胎繫於腎胎竊腎中之氣則腎陽不克上蒸脾土亦致脾虛泄瀉即或間有風寒暑濕之所感者亦半屬於脾腎之虧大便虛急此脾土燥大腸澀也宜理脾胃與大腸川連乾薑木香甘草嘔吐腹痛手足逆冷寒水侮土也六君子湯補一去半夏加補骨脂益智仁煨鮮薑寒熱作嘔肝木侮土也異功散加柴胡白芍生薑有火加味逍遙散補二十二補二十一百節痠疼因縱意口腹也歸涼節命散和十七臍下陰冷理中異功散加肉果木香熱二補二十二協熱作瀉三黃熟艾湯寒三十三伏暑不消煩渴瀉水四苓散瀉二傷濕泄瀉小便自利胃苓湯瀉四脾腎虛弱白朮散和十八久瀉不已安胎和氣飲加減八珍湯和十一補三十二氣急筋攣骨節痛平安散紫蘇飲和十九散三霍亂嘔吐傷氣瀉利傷血妊娠危症也急治之心腹絞痛吐痢並作因五味積而為痰心情鬱而為火乍感寒熱邪正交爭陰陽相混故致此病香蘇散加藿香散十八回生散散十九心躁腹痛吐瀉並作六和湯和二十頭痛發熱是風邪也藿香正氣散散二十熱氣鬱結胸中煩躁蘆根竹茹葛根麥冬知母人參蔥四肢厥逆脈息虛弱人參白朮散和二十一傷食脾胃滯則水穀不能化精氣以養胎宜善為消導腹痛而食不化二陳湯加砂仁去半夏如嘔吐加藿香砂仁氣滯加木香和八吞酸噯腐二陳湯去半夏加左金丸和八寒十四腹滿泄瀉異功散加砂仁木香穀芽補二十二脾氣虛弱白朮陳皮為末穀芽湯下盅鳴兒在胞中口含臍帶上疙瘩因妊娠舉臂攀高脫於口而不能復含故作聲令妊婦曲腰就地如拾物狀使臍帶仍入兒口即止或用鼠窟中土為末入麝香二釐酒調下二錢墮胎三五七月多墮胎以三月屬心胞五月屬脾七月屬肺皆臟脈臟屬陰陰氣易虧故胎亦易墮此人皆防之而一月為胚形如珠露胎元未固又為足厥陰肝脈養之肝氣多郁肝火易動或不自謹胎即消而落矣一切忿怒勞倦皆宜慎之若房事更在所忌衝任氣虛宜養脾胃千金保胎丸補三十五六味丸加杜仲川斷阿膠北五味使腎氣壯而胎可固十聖散補三十四每月服六帖子宮為風冷所乘致營衛虧弱八珍湯加桑寄生防風補五少陽火動性急者多怒面色黑而氣實此相火太盛不能生氣化胎及食氣傷精故致胎墮四物湯加知母黃柏黃芩麥冬補七陰虛內熱黃芩阿膠生地麥冬白芍胎不長胎兒全賴血氣所養而血氣又賴脾胃水穀之精化之也以健脾扶胃為主八珍湯加蓮肉忌食鯉魚莧菜補五肝氣鬱怒而氣逆則血不調血不調則胎無以養而萎逍遙散和五氣血寒而陽不足則胎不長左歸飲加當歸砂仁乾薑補三十三火邪盛而真陰損致血熱而胎不長加味逍遙散加黃芩川連知母補二十一鬼胎腹脹連胸面色或青或黃脈澀而短或不數月而腹大如鼓形若抱甕按之其冷如冰總緣精神虛弱妖魅乘虛而入之也或本婦所願不遂發為白淫流入子宮結而為胎均曰鬼胎斬鬼丹攻一雄黃丸傷胎驚恐跌僕中寒中熱毒藥毒食皆致傷胎胎之生死脈未可憑須細心體認必實見其口舌色青腹冷口穢方可用下下血不止胎上衝心四肢厥冷悶絶將死竹茹蘄艾煎汁去渣入阿膠白蜜服川芎當歸二味煎服亦隱如腹中急痛血從口出亦用竹茹等味煎服七寶丹亦可下胎散二十二千金神造湯攻十三蟹爪一升阿膠三兩甘草一兩半産漏下昏冒瞑目因血亡而心與胞絡之火上乘也惟養血清火俾心氣清而不昏肺氣清而不瞑庶為得法切忌用風藥發汗經損而血不止非氣虛則血熱氣虛宜阿膠艾伏龍肝血熱宜生地丹皮麥冬茯苓丹參當歸之類腸覃石瘕肺主衛衛為氣得熱則泄得寒則澀寒氣客於腸外與衛氣相搏氣不得榮因有所繫結瘕而內著惡氣乃起息肉乃生漸而至大如懷子狀氣病而血未病故月事不斷應時而下木香通氣散散二十二寒氣客於子門氣不通而月事不下結硬如石非大辛熱之劑不能消見睍丸攻四倘有孕用香附子醋炒桃仁海粉醋煮白朮為末麵糊丸服之頗穩
