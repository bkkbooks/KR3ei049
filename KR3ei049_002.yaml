body:
  text: 卷中産後難産生産為天地化育之道本無所難其有難産者皆産家張皇自致之耳能靜以待之兒得轉身自然産下治法以順氣和血為主切勿肆用催生藥心懷恐懼而氣結不行恐則氣下懼則氣怯怯則上焦閉閉則氣還還則下焦脹氣乃不行宜服紫蘇飲散三胞破漿水下而兒不下速當補氣養血如魚得水而自順矣宜保産萬全湯和二十二再用濃煎蔥湯洗其産戶令上下之氣宣通胞中敗血壅滯兒枕破血裹兒身致轉身不利急服勝金散攻五暑月熱氣蒸人有鬱冒沖暈之患生化湯和二十四加益元散寒三十冬月寒氣逼人經血凝聚而難下宜生化湯加肉桂乳香和二十四交骨不開陰氣虛也加味芎歸湯補三十六開骨膏和二十三子趨穀道焦鹽尉之橫生逆産此因兒未轉身母即用力逼之遂致橫逆也或先露手或先露足以小針刺兒手足心用鹽擦之兒痛即縮入並以鹽摩産婦腹若眼閉心悶欲絶取頂上發如兩指大用力挽之眼即開或以米醋噀之車前子為末酒下亦可又兒先露手速令産母仰臥看生之婦將兒手推上徐徐正之候其身正煎催生藥服之使兒生下又三退散可下攻六盤腸産子未下而腸先下此因産母氣血虛弱因而下脫當大補氣血兼以升提參耆芎歸加升麻少許連服之自收若腸幹不收以磨刀水少許溫潤之或濃煎黃耆湯貯漆器內候弗冷弗熱將腸浸之令溫暖之氣上熏則腸自上或以萆麻子四十九粒研爛塗母頭頂待腸收上急洗去又五倍子白礬湯浸亦好子腸與子宮脫下者同一治法胎死腹中察産母腹脹口青或舌黑腹中陰冷重墜嘔惡不寧穢氣上衝皆子死之證速當下之當歸厚朴陳皮酒水各一碗煎半入朴硝三五錢再煎十餘沸服如在疑似之間只服芎歸湯為穩胎衣不下血入胞中胞脹而不能下其症面垢頰赤寒熱盜汗上連胸腹脹痛若因氣力衰憊不能送出者胸腹必不脹而痛總當忍痛正身俟之不可任意欠伸致血上衝心也血壅而胞衣不下失笑散攻七牛膝散攻八生化湯和二十四加牛膝煎湯送益母丸和二十七又牛膝一兩黃葵子一合煎服即下氣血虛弱不能送下保生無憂散和二十五風冷乘虛而入胞冷血凝而不下牛膝散去硝加桂附攻八血暈胎胞既下氣血暴虛忽而眼黑神昏不知人事速投人參芎歸以回其氣眼閉口開面白手冷六脈微弱是其驗也若惡露上行心下滿悶口噤而神脫者宜破血下血二者錯治則立斃矣惡露上攻急用失笑散攻七米醋燉熱和生韭汁貯有嘴瓶內將瓶口包裹以瓶嘴對鼻孔觸之極效敗血流入肝經急飲童便下生化湯瘀血奔心虛火上炎童便下益母丸即濟陰丹和二十七或童便送鹿角炭清魂膏寒三十一陰血暴亡心神無所養而君相二火乘於肺經則目瞑不省人事宜四物湯去熟地加生地白薇補七飲酒血暈血得酒熱而妄行也川芎當歸葛根使力過多而暈清魂散和二十六氣血兩虛痰火上湧二陳湯加硃砂和八虛風血暈當歸川芎桃仁荊芥厥凡産用力過多勞倦傷脾孤臟不能注於四旁心肝肺腎故足逆冷而厥氣上行也經曰陽氣衰於下則為寒厥厥氣上升滿脈去形逆氣上行滿於經絡則神氣浮越去身而散矣此非急以峻補大劑與之不能舉氣以歸元回陽而復神宜重用參耆使氣血旺而神復厥症自止人參生化湯如無塊痛滋榮益氣湯補三十七補三十八惡露不下養胎余血溷以漿水為惡露氣血旺者隨産而下氣血衰弱或挾寒冷或挾風邪遂留滯不行上攻則為血暈蓄瘀則為兒枕日久不出腹痛心痛遍身發熱五心煩熱骨蒸潮熱時作時止渾如瘧狀塊在兩脅動作雷鳴嘈雜眩暈食少羸瘦又與虛弱病相似慎勿誤治致成血臌等症宜生化湯合失笑散補而消之和二十四攻七起枕散亦好攻九若惡露流注四肢腰背等處久必腫起作痛速用蔥尉以散之內服加參生化湯如不速治將所注者化而為膿宜用神仙回膿散攻十一然氣血不旺不可輕用憎寒惡熱氣虛也十全大補湯補三十九日晡潮熱血虛也四物湯加參朮丹皮補七嘔逆胃氣虛也六君子湯加炒乾薑補一食少體倦脾虛也補中益氣湯補六四肢逆冷小便頻數腎氣虛也補中益氣湯加益智仁尉法用蔥一把搗爛為餅貼患處襯厚布兩三層以尉斗文火尉之惡露不絶元氣不足勞動傷經血也或惡血未盡適挾風冷而致氣血不調或過服固胎藥産雖下而惡露不去竟至二三月而點滴不已皆宜補血順血調氣通氣為主濟陰丹可加味用之和二十七氣血俱虛而淡紅不已十全大補湯補三十九怒火傷肝而血不藏加味四物湯補二十八胃氣下陷不能統血補中益氣湯補六脾經鬱熱血不歸源加味逍遙散補二十二肝氣熱不能生血六味丸補二脾虛不能攝血六君子湯補一傷衝任之絡而不止加味固陰煎補二六味丸補二加阿膠麥冬北五味血崩不止産婦耗傷氣血經脈未得平復而或驚憂恚怒或勞役損動或鹹酸不節傷於營沖或氣衰血弱不能固攝皆成崩中若小腹滿痛肝經已壞為難治也其餘鬱熱氣陷以致血崩與惡露不絶同治血多色紫敗血也當去之留之反作痛不可以作崩論生化湯加五靈脂生蒲黃以破之和二十四形脫而汗不止加參生化湯渴加麥冬瀉加茯苓兩手脈伏或右手脈絶加北五味麥冬痰加竹瀝薑汁驚加棗仁食不可進聞藥即吐胃虛也宜用參湯送飯鍋焦粉漸漸引開胃口然後服藥崩下如牛膜昏迷倒地乃受驚而然朱雄丸和二十九惡血重來如流水不止昏迷不知人事此因未滿一月妄行交媾以致血不歸經也急用金狗脊散和三十日久不止宜升舉大補湯補四十血脫妄言妄見宜升舉大補湯加辰砂少許以墜其心火補四十血崩如湧口噤目斜手足搐搦肝經血耗風生也六味丸加荊芥穗補二血來紫黑如豆汁色怒傷肝也宜加味四物湯和二十八血來鮮紅是驚傷心怒傷肝勞傷脾致血不歸經也生化湯和二十四加味治之鮮血來多再加升麻白芷各四分頭痛頭者諸陽之會産後陰虛陰虛則陽勝陽氣上湊於頭故頭痛又有瘀血之氣上衝於頭而痛者一宜滋陰一宜去瘀慎勿誤治身熱惡寒感冒風寒也生化湯加蓮鬚和二十四中氣虛補中益氣湯加蔓荊子少許補六氣血俱虛八珍湯補五陽氣虛補中益氣湯加附子補六腎水不生肝木六味丸加北五味補二氣滯芎烏散散二十四心痛非陽氣虛寒則瘀血上衝生化湯加肉桂吳茱萸可以治寒失笑散加當歸川芎可以行血若指甲青黑手足冷而過節此真心痛不治又惡血奔心一絲入於心臟即死足純青心下痛寒毒攻心也人參白朮附子肉桂當歸散其下寒而上寒自解食冷物而作痛生化湯加消食之劑和二十四感風邪而作痛生化湯荊芥防風生薑和二十四産後厥痛血虛也羊肉一斤煮汁去肉入當歸一兩炒白芍五錢炙甘草五分再煎服之羊肉須取精者中無血塊綿綿而痛按之即止血虛也宜八珍湯腹痛實則有惡露不盡乾血瘀積食傷氣滯虛則有氣弱寒阻血虛空痛須詳審施治虛者固宜調補氣血而實者亦勿得峻厲克伐瘀血上衝心腹脹滿疼痛牙關緊急按之愈甚大便難而小便易宜失笑散攻七煎湯下益母丸即濟陰丹和二十七乾血著於臍下行氣破血之藥投之不愈知內有乾血也生化湯加炒大黃炒虻蟲和二十四胸膈飽脹惡食吞酸手不可按此飲食傷也二陳湯加山楂神麯和八食消後而痛如故按之痛止或加頭痛煩熱作渴惡寒欲嘔等症此中氣傷也宜補脾胃六君子湯補一六脈沉伏四肢厥冷內傷飲食而惡血不行也宜行血消食失笑散加山楂神麯攻七如無惡血積食則為虛寒宜補氣暖胃産後六七日忽然臍腹疼痛此由呼吸之間冷氣乘虛而入也宜四順湯熱三腹中㽱痛客寒阻逆也精羊肉煮汁入當歸生薑煎服腹痛欲絶脈浮弦風入胞門也川斷一兩防風三錢煎服衝任空虛肝經血少脈弦熟地吳茱萸白芍木瓜蒺藜噁心作嘔六君子湯補一泄瀉六君子湯加炮薑砂仁生薑大棗補一腹中塊積生化湯加肉桂紅花和二十四六脈滑數瘀血成癰生化湯加丹參丹皮腎氣虛寒理陰煎熱四胃關煎熱五血少而痛黃雌雞湯補四十一小腹痛兒在胞中食母之血所餘者結而成塊産時塊從兒下則無患不下則滯而痛名曰兒枕痛黑神散攻十久而不已血化為膿又産後寒氣入腹硬築臍下刺痛為寒疝宜用炒吳茱萸勿誤治血化為膿流注關節則成骨疽脈洪而數是其候也失治多為敗症宜急治之若腹脹大或轉側作水聲或膿從臍出與大便出當用補以托之然後用神仙回膿散攻十一子離其宮血海陡虛所以作痛胞門受傷必致壅腫腫未消因而拒按似塊實非塊也勿得作兒枕治宜用殿胞煎補四十二五物煎補四十三腸瘍怒鬱血虛腸風皆致腸瘍食諸魚毒物亦能致瘍食鹽炒熱尉臍又箭鏃燒紅淬入酒中飲酒可愈川芎當歸甘草淮牛膝藁本為末酒調下腰痛腰者腎之外候胞胎繫於腎産則勞傷腎氣損動胞絡虛未平復風冷客之故令腰痛三聖散散二十五惡露斷腰重痛而下注兩股如錐刺入骨此血滯經絡必作癰疽四物湯加延胡補七真氣虛而邪乘之當歸黃耆湯加桑寄生補四十四久痛不已豬羊腎常食之腹脹善噫諸藥皆嘔脾虛也焦術米泔煎服脅痛膀胱宿有停水惡露下而不盡氣血與水相激故令脅肋脹痛痛而嘔吐抵聖湯攻十二非薑桂之辛以行藥勢反助其脹矣肝經血瘀四物湯加肉桂延胡蒲黃紅花補七肝經氣虛四君子湯加當歸白芍補四肝經血虛四物湯加人參白朮補七腎水不生肝木六味丸補二肺金盛克肝木瀉白散散二十六身熱汗出加參生化湯和二十四氣血兩虛十全大補湯補三十九怒傷於肝兩脅脹痛吐血寒熱宜八珍湯加柴胡丹皮補五遍身痛産後血氣失升降常度留滯關節筋脈引急是以遍身疼痛甚則腰脊強硬手足拘攣身熱頭痛切勿作傷寒治之若認作傷寒誤發其汗則筋脈動惕手足厥冷變生他症矣趁痛散加桑寄生和三十一按之而痛緩血虛也四物湯加炮薑人參白朮補七遍身青腫麥芽一重牛膝一重填入瓦罐鹽泥封固煅赤研末酒下二錢治血流諸經極效虛勞而指節疼痛汗出不止豬腎煮汁煎當歸人參黃耆生薑韭白淡豆豉少許溫服遍身皮赤兩腿肉青此敗血流經也生化湯加荊芥肉桂淮牛膝和二十四臌脹産婦素弱臨産勞傷中氣多不足胃雖納穀脾不健運先服生化湯和二十四三四劑七日後即服加參生化湯補五十八以助其脾氣自無虛滿之患或因便祕而誤服大黃或因多食而過服消導或因忿怒而誤服耗氣等藥又或恣飲寒冷凝滯惡露以致脹者或補氣或健脾或暖胃行血當察其所因以治之血塊因惡露未盡所致或産後氣血虛弱風冷乘之搏於臟腑與血氣相結因而成塊切勿輕用散氣行血藥風冷搏血生化湯加木香三分磨沖服和二十四冷濕乘虛而致生化湯加肉桂白芷炒薑半月外不散或如腫毒高寸許身熱食減生化湯加肉桂蓬朮炭攻補並治和二十四肢節肉裡結成小核此血虛筋燥而攣結也由多用行血破血藥以消塊致血不養筋而筋不舒耳宜補水以滋肝血養脾以運中氣八珍湯補五歸脾湯補十九加減治之傷食産後血氣已虛胃中元氣不足飲食偶有所傷即不能運化因成痞悶宿食停滯口乾滿悶六君子湯加神麯山楂補一怒後即食食停而悶生化湯加消食之劑和二十四食消而仍痞反作痛嘔脾胃傷也六君子湯補一咽酸噯腐加炮薑作瀉加升麻不應用補中益氣湯補六消導過多反致滿悶不思穀食宜長生活命丹補四十五嘔吐氣血大虧脾胃弱而中氣不運也敗血乘虛而入脾受之則不能運化精微而成脹滿胃受之則不能受納水穀而生吐逆宜用抵聖散攻十二勞傷臟腑寒邪入於腸胃加減生化湯和三十二七日外服溫胃丁香散和三十三嗽逆目眩石蓮散和三十四飲食傷脾六君子湯加砂仁補一腸胃氣逆腸胃燥澀而氣逆也宜六君子湯加藿香砂仁補胃氣虛寒六君子湯加炮薑木香補一寒水侮土益黃散散二十七肝木侮脾六君子湯加升麻柴胡補一命門火衰八味丸補四十六腹痛泄瀉手足冷陽氣虛也附子理中湯熱七口渴內煩少力血少汗多不生津液也宜生津益液湯和三十五吐蛔蟲胃氣將絶也人參白朮棐子白薇肉桂神麯吐膿血又復發斑因夏月受暑未曾發出至産始發火毒熾盛又不能盡發故見症如此不得不權用涼劑人參當歸川芎麥冬荊芥元參大嘔大喘風邪感於太陽也難治重用人參佐以麥冬當歸白朮少加荊芥桂枝嘔吐下痢邪感少陰也緣腎火衰微火為寒所驅逐腎水亦隨寒上趨而作嘔所謂真水虧真陽飛越也急用補陽之藥入於補陰之中引火歸源是為要法宜八味丸加減補四十六兩脅脹滿便血風邪傷肝也此猶可救者因其有便血耳不然邪留兩脅反成腹心之病當歸麥冬川芎三七根霍亂此由勞傷氣血臟腑虛損食不運化而邪復乘之致陰陽升降不順清濁亂於腸胃冷熱不調邪正相搏而然血塊疼痛未淨生化六和湯和三十六血痛已除藿香溫胃散散二十八渴而飲水五苓散瀉五手足逆冷問無血痛用附子散熱六厄逆産後氣血皆傷風冷搏於氣分則氣逆而上為厄又脾胃虛冷因食熱物冷熱之氣相沖擊使氣不順而厄逆胃氣虛寒丁香乾薑肉桂胃中伏熱乾柿竹茹脾胃虛熱人參附子中氣大虛陰火上衝八味丸補四十六喘急榮衛暴竭衛氣無主獨聚肺中故令喘急此為孤陽絶陰真險候也大料川芎湯救之或生脈散合生化湯補二十三和二十四敗血入肺坐不能臥生化湯合失笑散或六君子湯合失笑散和二十四補一攻七汙血感寒桃仁丹皮茯苓乾薑蔞仁北五味桂枝桑皮紫蘇枳實水氣凌肺人參白朮茯苓麥冬蘇子脾虛生痰六君子湯加薑汁竹瀝補一憂惱作喘川芎當歸杏仁桑皮外感作喘川芎當歸旋覆花茯苓半夏杏仁前胡氣短似喘生化湯和二十四加人參沉香六七日忽然手足蜷臥息高氣喘噁心腹痛此少陰感寒邪而在內之真陽為寒氣逼越於上焦上假熱而下真寒也人參麥冬肉桂白朮吳茱萸煎湯候其微冷頓服之若至半月一月外患此症人參白朮茯苓當歸熟地麥冬吳茱萸附子牛膝煎服之皆為難救之症七日內外感風寒鼻塞惡寒身熱頭痛重嗽宜用加參寧嗽生化湯痰多加花粉或加竹瀝薑汁沖服惡寒毋用麻黃脅痛毋用柴胡火嗽發熱毋用寒涼總以調理血氣為主和三十七誤食耗氣藥致氣促絶食人參生化湯送飯鍋焦粉補三十七蟬聲敗血沖遏於心轉入於肺氣與血並結成塊入喉作聲竟似蟬鳴此症十不救一浮腫敗血乘虛流入經絡日久化水故令面黃四肢浮腫若作水氣治之便致夭枉宜小大調經湯和三十八三十九血流為水者下午腫甚腫處必有血痕或脅脹刺痛咳嗽小便澀寒水侮土也宜補脾肺補中益氣湯補六氣虛六君子湯補一四君子湯去甘草加米仁炒陳卜子補四六脈沉細無力或咳嗽或泄瀉不止脾土虛寒命門火衰也金匱腎氣湯補四十七口渴惡寒脈沉無力體虛而有濕熱之積也必上焦滿悶宜補中行氣兼用導水之劑白朮茯苓陳皮木通外感風寒氣血滯於經絡或脅腹絞刺嘔吐噁心宜加味吳茱萸湯散二十九氣鬱作脹枳實炒白朮發熱産後發熱有傷力有血虛有停瘀有蒸乳有風寒有多食其病不一狀類傷寒切勿發汗致成肉瞤筋惕亡陽譫語鬱冒昏迷等症血虛川芎當歸人參薑炭氣虛補中益氣湯加炒薑補六吞酸噯腐飽悶惡食此飲食停滯也宜四君子湯加砂仁山楂神麯補四肝虛血燥陰火內發宜逍遙散以清肝火若用大補熱燥更甚和五陰虛陽無所依浮散於外而為熱四物湯加炙乾薑補七加茯苓使天氣降而生陰亦妙失血多汗出不臥怔忡驚悸妄言妄見加味歸脾湯補三血虛感風生化湯加荊芥穗和二十四誤服寒涼之劑以致寒氣隔陽於外四君子湯加乾薑肉桂不應加附子補四肌膚髮熱面赤大渴血脫髮燥也當歸補血湯補四十八敗血攻心狂言奔走乾荷葉生地丹皮生蒲黃胸脅脹痛腹中痞悶吐血盜汗或便血不止此諸臟虛損也故有虛寒假熱之狀十全大補湯補三十九産後潮熱有汗大便不通毋專論為陽明症頭痛惡寒毋專論為太陽症頭疼脅痛毋專論為少陽症總由血氣兩虛陰陽不和而類外感也加味生化湯調和榮衛諸症自退矣和四十口燥咽乾而渴毋專論為少陰症腹滿咽乾大便實毋專論為太陰症煩滿四肢冷毋專論為厥陰症譫語便祕毋專論為胃中有燥屎多因勞倦傷脾運化稽遲血枯腸燥虛症類實病也加味通幽散和四十一乍寒乍熱血閉於陽經榮衛行之不通則寒血閉於陰經榮衛行之不通則熱陽氣不足陰氣上入於陽中則惡寒陰氣不足陽氣下陷於陰中則發熱外經為寒邪客之則榮衛不通而發熱內府為冷物傷之則榮衛不通而為寒陰陽不和四物湯加減用之去熟地加人參乾薑甘草補七陰陽不歸其分陽下陷而陰上冒八珍湯補五元氣未復而濕熱乘之補中益氣湯補六血虛而渴當歸補血湯補四十八肝木侮土致停食而寒熱六君子湯加木香補一風寒客於經絡川芎當歸蓮鬚蔥白乳孔脹痛瞿麥通草連翹花粉甘草青皮桔梗煎服噯氣滿悶飲食傷也異功散加山楂神麯補二十二汗汗本血液屬陰陰亡陽亦隨之而走故曰汗多亡陽又曰肝心之液也血虛則腎中之陰不能上注於心故心虛而汗出又陰虛暴亡陽氣無所歸附則浮散於外而汗不止産畢自汗塊痛未除先服生化湯即繼服調衛止汗湯俟汗止減參耆以消塊痛和二十四補四十九睡中妄言大便不通加參生化湯加麻黃根棗仁地骨皮補三十七汗而泄瀉加參生化湯加麻黃根肉果蓮子補三十七汗多而小便點滴加參生化湯加麻黃根麥冬葛根北五味補三十七汗多亡陰致筋脈拘急類於痓症宜加味生化湯和四十大汗如雨口渴舌乾發熱而躁此精血乾枯無以養心陽無陰而不化也黃耆當歸桑葉合生脈散和二十三聞響汗出諸藥到口即吐脾氣敗也用人參附子為末隨液咽下昏冒瞑目此血亡而火熾也但補其血全生活血湯補五十一産後汗出多因勞倦驚恐所致也內經云搖體勞苦汗出於脾驚而奪精汗出於心恐懼汗出於肝産婦有此諸因故不能鎮守其液而汗出宜健脾胃使水穀之精灌溉四旁則五臟沖和而汗自止歸脾湯補十九産後血虛自汗氣促為肺氣上浮也然血去過多陽為陰逼而汗出不止宜滋營益氣湯補三十八則血復産婦所以喜也産後真陽不足上氣喘急手足厥冷或短氣盜汗自汗大聖散補十二如心虛盜汗或睡中汗出加味歸脾湯補三氣脫自汗作奪汗論大汗淋漓氣促膚冷急以四君子湯補氣補四若陰血下脫孤陽上越而大汗出此危候也急服四君加黃耆五味子救之若自汗由血虛而外溢也宜止汗散補五十二中風發熱頭痛氣喘面如朱妝元陽不能自固也唇青肉冷目眩神昏虛極生風也口眼喎斜氣血俱虛不能榮養筋脈也汗出不止血虛腠理不密也角弓反張血虛體弱風入諸陽之經也牙關緊急口噤不開血氣空虛風入頜頰口之筋也筋脈拘急而為瘈弛縱而為瘲陰血去多陽火熾盛肝木枯而筋無所主也頑痹不仁羸乏少氣臟腑虛損風冷客於經絡皮膚也或肝經血燥而挾風熱也總宜大補氣血為主或加荊防薑附鉤藤天麻一二味亦可切忌薑蔥並風藥以致不救氣虛四君子湯加味用之補四血虛四物湯加味用之補七氣血兩虛十全大補湯補三十九如血痛未除生化湯加味用之和二十四遍身疼痛手足癱瘓血虛有風痰生化湯加薑汁竹瀝和二十四陰虛內熱熱盛生風四物用生地加丹皮麥冬補七搖頭馬鳴身反折氣如絶汗如雨兩手摸空不治不語心者君主之官神明出焉外應於舌舌聲之機産後虛弱致敗血停蓄上干於心心竅閉塞故神志不能明又心氣通於舌氣閉則舌強不語有熱痰迷塞心竅則不能言腎之別脈上入於心系舌本虛則不能言脾之脈是動病舌本強不能言大腸之脈散舌下風熱入於大腸則不語目閉不語痰氣鬱滯也孤風散生白礬一錢熱水調下若瘀血壅滯琥珀散琥珀花蕊石鬱金硃砂研末童便好酒下一錢血氣痛上衝於心生化湯和二十四氣閉不語七珍散散三十風火加味逍遙散補二十一舌出不收墊壅於心也丹砂末敷之暗擲盆盎作墮地聲驚之即收驚悸血虛心氣不足也心虛而受風邪遂成驚悸名曰心風其狀目睛不轉其脈動而弱宜大補氣血若作風治速之危矣怯然如人將捕之心血虛也塊痛未除且服生化湯和二十四塊消痛止宜加減養榮湯補五十三發狂譫語敗血衝心肝火上炎痰結於胸熱入血室皆致譫語顛狂神不守舍八珍湯加茯神麥冬棗仁薑棗補五寒熱如瘧晝輕夜妄熱入血室也琥珀地黃丸加柴胡攻十四一靈三聖散攻十五脅痛便血肝血虛火上炎也加味逍遙散補二十一因驚悸悶用辰砂二錢研細乳汁調和另用白頸活地龍一條入熱酒滾二三沸去之入辰砂重湯再煮分三服發斑敗血流入臟腑充滿於肌膚旁連於四肢熱結留注轉還不得故發斑十無一生見鬼肝藏魂心藏神血虛心失所養肝火上炎神魂不能守舍是以妄言見鬼也敗血停心煩躁錯亂小大調經湯加薄荷和三十八和三十九心血虛損生化湯加棗仁柏子仁茯神麥冬和二十四煩渴去血多則津液少故煩躁而發渴宜滋陰降火可少加童便余血奔心荷葉散攻十六陰虛火動人參當歸湯補五十四氣虛而渴生脈散補二十三加蓮子血虛而渴四物湯加花粉麥冬補七頭眩腳弱飲食無味氣血俱虛也參地麥冬甘草花粉糯米薑棗煎服咳嗽有外邪有內傷有瘀血皆致咳嗽惟吃鹽太早咳者難治惡血流入肺經面赤發喘生化湯合失笑散和二十四攻七鼻塞聲重生化湯加杏仁荊芥和二十四陰血虛四物湯去白芍加人參白朮補七頭痛加蓮鬚肺氣不足四君子湯加當歸川芎補四陰水不足火克肺金六味丸加麥冬花粉補二肺虛外感風寒補中益氣湯加紫蘇桔梗補六胃虛不生肺金異功散加當歸白芍補四十九半月外干嗽四物湯加訶子皮茯苓甘草阿膠補七百日內感風重嗽汗多宜加參寧肺生化湯補五十五口鼻黑衄氣血大虛惡血乘虛流入諸經不能復出故為衄五色最忌黑口鼻屬肺胃之部口鼻間氣色現黑肺胃敗矣又虛火載血上行不循經度溢出孔竅肺胃為熱逼熱極反從水化致口鼻變現黑色亦危候也速用童便淮牛膝丹皮澤蘭二地倍人參大劑救之止衄之法取産婦頂心發一縷紅線一縷系中指節奇驗瘧疾半月內外寒熱往來或晝或晚或夜寒熱交作應期而發或一日二三度其證類瘧總由氣虛則寒血虛則熱胃氣虛則惡寒胃氣下陷則寒熱往來惟大補氣血其病自退汙血生化湯加生蒲黃乾荷葉澤蘭淮牛膝和二十四飲食停滯六君子湯加山楂神麯補一勞倦傷氣補中益氣湯加川芎補六氣血俱虛十全大補湯加炮薑補三十九元氣脫陷重用人參加附子鬱怒傷脾逍遙散和五外感風寒生化湯加荊芥防風藿香生薑和二十四瀉痢惡露不行滲入大腸則洞泄不禁下青白黑色其餘非食積則寒濕再則脾胃弱肺氣虛皆能致瀉若痢亦由惡血滲入大腸積滯而成謂之産子痢其病甚危又久痢身體羸弱謂之虛羸痢氣不順而下痢謂之氣痢又有外感六淫內傷飲食所致總當兼氣血虛處治之切不可用治痢常法以致不救惡露未盡而泄瀉生化湯加茯苓俟惡血盡然後或消而治之和二十四若虛弱不能支持加人參完穀不化生化湯加茯苓訶子皮蓮子生薑不愈加人參和二十四乾渴胃氣虛不生津液也生化湯合生脈散和二十四二十三食物不化常噫生化湯加茯苓神麯山楂砂仁熱八胠肋䐜脹腹中痛流注無定處産未滿月風邪乘虛襲之留於肓膜散於腹肋故腹中陳陳作痛水穀不化脹鳴泄瀉也宜調中湯熱八脾胃虛弱血塊未散先服生化湯加木香砂仁益智仁血塊已除六君子湯加肉果益智仁再加升麻柴胡以提胃中清氣余血不盡滲入大腸洞泄不禁服的奇散荊芥大者四五穗於盞內燒炭不可犯油火入麝香研末清湯調下年久脾泄不止參苓蓮子飲補五十七産後七日內外患赤白痢後重頻並最為難治欲調氣行血推蕩痢邪又慮産後元虛欲滋榮益氣而大補産弱又慮轉助痢邪若行不損元補不助邪惟生化湯減黑薑加茯苓木香為善消惡露兼行痢積並治而不悖也厥逆躁不得臥殊難救治人參當歸荊芥積滯腹痛人參當歸白芍紅曲醋炒升麻甘草益母草如惡露未盡加乳香沒藥砂仁阿膠渴而不喜冷飲胃氣虛不生津液也七味白朮散補五十六如夜間發熱腎水虛不能潤也六味丸補二痢而嘔吐六君子湯加藿香補一如胃火盛用活田螺麝香搗和掩臍後用滋陰清胃之劑血崩痢不止加參四物湯補七脫肛氣血兩虛也加參生化湯補五十八褥勞産後虛羸喘乏乍寒乍熱病如瘧狀此氣血不充周也宜大補氣血肝腎虛弱口乾咳嗽陰虛火動也宜六味丸加北五味麥冬補二脾弱血虛月水不調八珍湯補五脾虛血燥皮膚瘙癢加味逍遙散補二十一虛汗不止母雞湯補五十九四肢疼痛外邪感也石子湯和四十二虛寒腹痛黃雌雞湯補四十一外熱內寒外邪感也理陰煎加減治之熱四陽虛內寒理陰煎羊肉湯熱四補六十大便不通去血過多大腸乾涸或兼火燥總勿用峻利之劑以亡陰而致便祕愈甚血虛生火四物湯加麻仁補七加味六味丸補五十氣血俱虛十全大補湯加肉蓯蓉補三十九飲食如常腹中如鼓八珍湯加桃仁補五脹滿欲去不能結在直腸宜豬膽汁導之小便不通産後亡血或又多汗且勞倦脾傷不能為胃行其津液則其生化之氣不運滲泄之令不行是以上氣不行而有咽乾燥渴之症下氣不行而有胃腎關閉之候治當助脾益肺升降氣血則氣血妄行陰降陽升自然津液充而小便利汙血阻滯瞿麥蒲黃血虛熱鬱六味丸逍遙散補二和五熱氣客於脬中茅根湯寒三十二腹脹如鼓悶亂不醒冷氣積於胎前也用食鹽填入臍中搗蔥白為餅約一指厚置鹽上用艾火隔蔥餅灸之覺熱氣入腹內即時便通濕氣感於胞絡下陰腫脹小水點滴不出此腎虛膀胱之氣亦虛而不能化也人參白朮茯苓肉桂米仁熟地車前子血從小便出熱邪搏血滲入胞中而成血淋也白茅根瞿麥車前子通草鯉魚水煎入石首魚石末服大小便不通陰血不足津液枯燥宜服牛乳人乳或惡血流入小腸閉塞水道小便不通流入大腸瘀積成塊形如雞肝肛門燥結大便不通宜服生化湯加桃仁麻仁郁李仁瞿麥等味和二十四便血心氣虛則小腸不能制而血流脾氣弱則大腸無移蔭而血下故二便出血當實之心脾二經血氣虛而熱乘之故血隨小便而出血熱則流故滲入胞內用髮炭滑石末地黃汁調下面黃脅脹少食此肝木乘脾土也加味逍遙散補二十一驚悸不寐加味歸脾湯補三大便下血緣六淫七情致傷元氣陽絡外傷而然也腸胃虛弱六君子湯加升麻柴胡若虛寒去升柴加肉果如怒動肝火加當歸白芍去升麻膏粱積熱四物湯加丹皮山楂補七大腸風熱四物湯加荊芥防風同上大腸血熱四物湯加丹皮槐米同上遺糞腎虛無約束也都氣飲補二十四脾腎不足補中益氣湯補六脾腎虛寒八味丸補四十六小便不禁非肺氣虛而不能約制即腎氣竭而虛熱移於膀胱也氣虛不能制人參黃耆桑螵蛸鹿茸牡蠣赤石脂脾腎虛寒七味丸補三十一尿脬破損豬羊胞煎湯入人參黃耆當歸熟地陳皮茯苓桃仁於極飢時飲之然須急治緩則不能成功也又補脬飲用生黃絲絹一尺煎碎白牡丹根皮白及各一錢俱為末水一碗同煮至絹爛如餳空心頓服服時不得作聲作聲則不效膀胱陰虛補中益氣湯加山茱萸山藥桑螵蛸以補肺腎則小便自不淋瀝補六乳汁不行乳汁乃氣血所化故人衝任之脈盛脾胃之氣強則乳汁多而濃衰弱則淡而少治宜壯脾胃滋化源氣血壅閉不行宜通草土瓜根漏蘆以疏之血氣衰弱不行宜豬蹄鯽魚生地當歸之類以潤之玉露散補六十二加味四物湯補六十一通乳湯和四十三俱可補血以通乳汁乳汁湧出非氣血虛而不攝則滿而流溢當以人之強弱乳汁之濃淡驗其虛實也肝經血熱加味逍遙散補二十一肝經鬱怒加味歸脾湯補三脹急而痛漏蘆散散三十氣血虛弱十全大補湯補三十九乳癰足陽明之脈從缺盆下乳內廉足陽明之經夾臍上行至胸中而散其經為邪熱攻衝則血為之擊搏氣為之留滯擊搏則痛作留滯則腫生此由乳汁壅積與氣相擊搏故也或忿怒所逆鬱悶所遏厚味所釀以致厥陰之氣不行故竅不通而汁不得出治法宜疏厥陰之滯清陽明之熱青皮生甘草節栝蔞銀花當歸沒藥皂角橘葉橘核少佐以酒隨意消息可也乳懸瘀血上攻忽然兩乳伸長細小如腸直過小腹痛不可忍用川芎當歸煎濃汁不服時又用此二味燒煙令病人吸之使瘀血消而乳自愈玉門不閉元氣素弱失於調養以致血氣不能收攝故也氣血虛弱十全大補湯補三十九腫脹焮痛肝經虛熱也加味逍遙散補二十一産戶痛起居早感風邪也用祛風定痛湯散四生地當歸茯苓川芎荊芥防風肉桂大棗陰蝕此因心神煩郁胃氣虛弱致氣血留滯也當補心養胃川芎當歸白芍地榆米泔水五升煎二升熏洗三夜又荊芥薄荷柏葉煎湯洗淨後用倍子青黛黃丹水粉為末摻之如瘡水乾燥用香油調末塗之陰中濕爛多由七情鬱火濕熱下注或腫或痛或癢先以甘草煎濃湯乘熱熏洗或五倍子白礬蔥白煎湯熏洗或甘菊花葉不拘多少搗爛以百沸湯淋汁熏洗挹干用烏賊骨末炒黃水粉煅過爐甘石煅淬童便加冰片少許研細末摻之腫痛潰爛四物湯補七加梔子丹皮膽草荊芥或加味逍遙用補二十一陰脫此因分娩損傷胞絡也治宜升補元氣固真陰分娩過勞氣陷而脫加參生化湯散五十八或歸脾湯補三外用硫黃海螵蛸北五味為末敷之陰虛滑脫加味固陰煎澀二氣虛下陷補中益氣湯補六或十全大補湯補三十九陰突血虛氣陷不能固攝陰中突出如芝如菌或挺出數寸謂之陰挺血虛陰挺四物湯補七衝入煅龍骨末少許空心連進二服外用蛇床子五兩烏梅十四枚煎湯熏洗鬱熱下墜加味逍遙散補二十一或龍膽瀉肝湯寒十一
