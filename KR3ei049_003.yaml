body:
  text: 卷下列方補方六十三六君子湯一人參白朮炒茯苓去皮炙甘草廣皮半夏制半夏辛燥胎孕三月前須斟酌用之不可輕投茯苓降下初孕亦當慎用六味丸二熟地山藥茯苓山萸肉去核丹皮澤瀉加味歸脾湯三人參白朮炒茯神去皮木當歸去尾棗仁去殼炒蓮肉去心黃耆蜜炙遠志木香遠志辛散而上升不宜多用四五分足矣四君子湯四人參白朮炒茯苓炙甘草八珍湯五人參白朮炒茯苓炙甘草熟地當歸白芍酒炒川芎川芎理血中之氣胎前宜酌用補中益氣湯六人參白朮炒炙甘草當歸廣皮升麻柴胡升柴發散可用錢許升提用二三分足矣四物湯七熟地當歸白芍酒炒川芎安榮散八人參當歸白芍酒炒麥冬叉斛山梔通草安胎飲九人參白朮炒炙甘草生地當歸廣皮升麻柴胡生薑大棗氣不下陷勿用升柴杜仲丸十杜仲薑汁炒川斷酒炒棗肉蒸為丸米飲下當歸芍藥湯十一當歸白芍酒炒白朮炒茯苓澤瀉川芎少許大聖散十二人參黃耆炙炙甘草茯苓當歸川芎麥冬去心木香薑棗川芎宜酌用加味安胎飲十三人參白朮炒炙甘草熟地當歸川芎不宜多用紫蘇四五分陳皮如寒加乾薑五君子湯十四人參白朮炙甘草廣皮乾薑內補丸十五熟地當歸青娥丸十六杜仲薑汁炒破故紙鹽水炒核桃去殼蜜丸紫酒十七大黑豆二合炒好酒一盞煎服通氣散十八破故紙炒先嚼胡桃加味歸脾飲十九人參白朮炒茯神去皮木遠志不可多黃芩山梔丹皮香附木香去黃芩山梔丹皮香附加棗仁圓眼肉名歸脾飲補中安胎飲二十人參白朮茯苓炙甘草熟地當歸黃芩紫蘇白芷炒薑棗加味逍遙散二十一白朮茯苓當歸白芍炒柴胡丹皮黑山梔熟地異功散二十二人參白朮炒茯苓炙甘草廣皮生脈散二十三人參麥冬去心北五味都氣飲二十四熟地山藥茯苓山萸肉澤瀉丹皮北五味甘草大棗湯二十五小麥炙甘草大棗安胎調氣飲二十六人參白朮炒炙甘草熟地當歸白芍酒炒川斷杜仲陳皮砂仁補血湯二十七黃耆炙當歸川芎黃耆糯米湯二十八黃耆六兩炙糯米五合水六升煎半分四服日三夜一辰砂安神丸二十九生地當歸柏子仁炒去油棗仁去殼炒茯神去皮木竹茹砂仁補心湯三十人參茯苓炙甘草熟地當歸白芍酒炒棗仁麥冬小麥七味丸三十一熟地山藥茯苓丹皮澤瀉山萸肉肉桂加味八珍湯三十二人參白朮茯苓炙甘草熟地當歸白芍酒炒肉果麵粉裹煨罌粟殼醋炒左歸飲三十三熟地山藥茯苓山萸肉杞子炙甘草十聖散三十四人參黃耆炙白朮炙砂仁炙甘草熟地白芍炒當歸川芎川斷姜棗千金保胎丸三十五熟地當歸阿膠川斷杜仲黃芩炒香附制砂仁艾葉炒炭棗肉加味芎歸湯三十六當歸川芎發余炭鱉甲炙人參生化湯三十七人參當歸川芎炙甘草薑炭多則四分桃仁去皮棗肉加附子一片以回陽止逆亦可助參耆之功若渴用人參麥冬北五味滋榮益氣湯三十八人參白朮炒熟地當歸川芎北五味黃耆炙陳皮麥冬去心有汗加薑棗大便不通加蓯蓉塊痛加肉桂益母草痰加薑汁竹瀝瀉加茯苓十全大補湯三十九人參白朮炒茯苓炙甘草熟地當歸白芍炒川芎肉桂黃耆升舉大補方四十人參白朮炒熟地當歸川芎黃耆炙麥冬去心陳皮炙甘草升麻白芷炒荊芥黃雌雞湯四十一熟地當歸白朮炒黃耆炙肉桂雞汁煎服殿胞煎四十二當歸川芎炙甘草茯苓肉桂五物煎四十三熟地當歸白芍炒川芎肉桂當歸黃耆湯四十四當歸黃耆炙白芍炒長生活命丹四十五人參生薑蓮子去心麥芽炒煎湯送飯鍋焦粉二匙漸加至四五匙八味丸四十六熟地山藥山萸肉茯苓丹皮澤瀉附子肉桂金匱腎氣湯四十七熟地山藥山萸肉茯苓丹皮澤瀉附子肉桂懷牛膝車前子當歸補血湯四十八當歸黃耆炙茯苓調衛止汗湯四十九人參黃耆炙麻黃根炙甘草陳皮當歸桂枝大棗桂枝發表用於止汗之中不過引參耆以固衛耳一二分足矣加味六味丸五十熟地山藥山萸肉去核茯苓丹皮澤瀉麥冬去心北五味全生活血湯五十一黃耆炙熟地生地川柏炒炭升麻不應加人參止汗散五十二人參當歸麻黃根熟地牡蠣小麥麩炒川連炭少許加減養榮湯五十三當歸川芎茯神棗仁去殼炒麥冬去心人參圓眼肉陳皮炙甘草生薑竹茹人參當歸湯五十四生地當歸白芍炒人參麥冬去心竹茹粳米大棗加參寧肺生化湯五十五當歸川芎人參炙甘草橘紅桑皮炒杏仁半夏制虛而多痰加薑汁竹瀝七味白朮散五十六人參白朮炒茯苓炙甘草藿香木香乾葛參苓蓮子飲五十七人參白朮炒茯苓炙甘草當歸白芍山藥陳皮升麻蓮子生薑加參生化湯五十八當歸川芎人參黃耆炙甘草炙升麻白朮炒北五味母雞湯五十九人參黃耆炙白朮炒茯苓牡蠣麻黃根黃母雞汁煎羊肉湯六十當歸川芎生薑精羊肉加味四物湯六十一熟地當歸白芍炒川芎花粉木通豬蹄以蔥洗乳房玉露散六十二人參茯苓炙甘草當歸白芍炒川芎桔梗阿膠散六十三當歸白朮炒茯苓阿膠甘草炙川芎少許陳皮姜棗散方三十一抑青丸一柴胡當歸炙甘草鉤藤白朮炒清肝飲二生地當歸生白芍柴胡麥冬去心蘇梗香附制青皮炒炭紫蘇飲三當歸白芍炒人參炙甘草陳皮砂仁蘇葉蔥白生薑祛風定痛湯四生地川芎茯苓肉桂荊芥防風獨活大棗天仙藤散五天仙藤香附制陳皮炙甘草木瓜姜皮烏藥順氣湯六烏藥殭蠶炒乾薑炙甘草陳皮木賊制香附白芷蔥宜加生血活血之品芎蘇散七紫蘇川芎不宜多白芍炒陳皮白朮炒炙甘草麥冬去心鉤藤湯八鉤藤鉤當歸人參茯神桑寄生桔梗如煩熱加石膏一錢木香散九木香炙甘草丁香淡鹽湯下五加皮散十五加皮阿膠蒲黃炒杜仲鹽水炒狗脊白芍炒防風萆薢杏仁去皮薄荷五加皮丸十一五加皮杜仲炒狗脊白芍炒萆薢川斷訶子薄荷縮砂散十二砂仁末米飲下防風丸十三防風黃芩炒米飲調下升陽除濕湯十四柴胡升麻豬苓澤瀉炒陳皮炙甘草炒蒼朮炒白朮防風姜棗胃風湯十五當歸柴胡升麻葛根炙甘草蔓荊子藁本木賊川柏炒蒼朮制姜棗桂枝茯苓湯十六桂枝茯苓丹皮炒白芍桃仁炒焦蘇香丸十七當歸炒白芍砂仁炙甘草黃芩炒蘇梗木香香蘇散十八香附制紫蘇陳皮炙甘草砂仁生薑陽明加葛根知母少陽加柴胡太陽加防風回生散十九橘紅藿香淡薑湯下藿香正氣散二十藿香白朮炒茯苓炙甘草陳皮砂仁桔梗紫蘇蒼朮炒姜棗可加木香木香通氣散二十一木香枳殼炒製厚朴草果煨檳榔陳皮製附子穿山甲炙蔥白七寶丹二十二人參炙甘草當歸白芍炒川芎紫蘇生薑大腹皮醋炒多則二三分蔥白消風散二十三甘菊荊芥當歸大豆葉炒防風茶葉羚羊角鎊生石膏三四分芎烏散二十四川芎烏藥加當歸更穩三聖散二十五肉桂當歸延胡索醋炒瀉白散二十六地骨皮杏仁去皮桑白皮炙益黃散二十七陳皮青皮炒焦訶子煨丁香炙甘草藿香溫胃飲二十八人參白朮炒炙甘草陳皮藿香丁香當歸薑炭厚朴制生薑手足冷加附子加味吳茱萸湯二十九肉桂當歸吳茱萸泡乾薑防風丹皮赤茯苓麥冬去心炙甘草桔梗細辛少許半夏制七珍散三十人參生地川芎石菖蒲鮮者佳防風細辛硃砂薄荷湯下漏蘆散三十一漏蘆蛇蛻炙蔞仁好酒調下攻方十六斬鬼丹一川芎秦艽柴胡吳茱萸泡芫花醋炙巴戟巴霜殭蠶炒蜜丸酒下出惡物即愈雄黃丸二雄黃鬼臼硃砂巴霜獺肝蜥蜴炙蜈蚣炙清湯下服過前方既下惡物即以補元為要七寶丹三紫蘇大腹皮炙甘草人參當歸白芍川芎生薑蔥白見睍丸四附子制乾薑茴香炒吳茱萸鹽水炒巴戟肉桂莪朮醋炒桃仁炒延胡索醋炒勝金散五鹽豉一兩麝香一錢青布包燒炭研末稱錘燒赤淬酒下三蛻散六蛇蛻炒焦蟬蛻焙燥發灰益母草湯調下失笑散七生蒲黃五靈脂牛膝散八懷牛膝川芎生蒲黃肉桂朴硝少許起憂散九當歸川芎赤芍肉桂丹皮生蒲黃五靈脂沒藥延胡索白芷黑神散十黑豆地黃當歸赤芍生蒲黃炮姜炙甘草肉桂研童便下神仙回膿散十一大黃炒白芷木香沉香沒藥蛤粉穿山甲炙每服一丸重一錢五分參湯下抵聖湯十二茯苓炙甘草陳皮半夏人參赤芍澤蘭生薑千金神造湯十三蟹爪一升阿膠二兩炙甘草一兩琥珀地黃丸十四琥珀蒲黃炒延胡索黏米炒生地生薑生地汁浸生薑渣生薑汁浸生地渣蜜丸一靈三聖散十五乾荷葉乾地黃粉丹皮生蒲黃另研末以前三味煎湯送下荷葉散十六荷葉地黃汁延胡索醋炒澀方三十三大寧散一黑豆三十五粒罌粟殼半生半熟二兩甘草半生半炙二兩生薑加味固陰煎二人參熟地山藥山萸肉川斷北五味當歸菟絲子炒炙甘草寒竹茹麥冬湯一竹茹三兩麥冬去心一兩前胡一錢五分橘皮一錢蘆根三兩煎服如身熱加地骨皮一兩滋陰清燥湯二生地生白芍麥冬去心知母炒茯苓條芩葛根橘紅鹽湯泡炙甘草竹茹燈草犀角散三犀角條芩麥冬去心地骨皮茯苓竹瀝沖甘草竹葉湯四茯苓麥冬去心黃芩竹葉防風麥冬湯五麥冬去心人參茯神生地黃芩犀角炙甘草蓮子知母丸六知母炒為末棗肉丸虛者人參湯送下知母飲七知母麥冬去心赤茯苓黃芩黃耆炙甘草炙桑皮竹瀝調中和氣散八蘇梗砂仁殼石膏不可多知母炒川柏炒前胡百草霜加味羚羊角散九羚羊茯神當歸杏仁甘草麥冬去心五加皮米仁棗仁防風川芎少許有痰加竹瀝薑汁天冬飲子十天門冬知母炒茯苓白芍熟地荊芥人參當歸防風北五味川芎不宜多羌活生薑茺蔚子不宜多龍膽瀉肝湯十一人參天冬龍膽草酒炒麥冬去心川連炒生甘草山梔知母炒黃芩柴胡北五味天冬湯十二天冬紫菀知母炒桑皮蜜炙桔梗北五味如嗽血加黃芩阿膠寧肺飲十三天冬知母炒紫蘇桔梗炙甘草寒加杏仁桑皮多痰加薑汁竹瀝陳皮熱加黃芩心不舒暢加百合川貝虛加人參紫菀左金丸十四川連吳茱萸泡涼胎飲十五生地當歸白芍甘草茯苓叉斛香附制側柏丸十六側柏葉黃芩蜜丸清湯下赤帶漏下如豬肝汁此方可治滋腎丸十七知母川柏肉桂少許清金利水湯十八生地當歸麥冬去心花粉扁豆知母澤瀉廣皮淡竹茹湯十九淡竹茹三四兩煎汁服一二碗三黃解毒湯二十黃芩炒黃連炒黃柏炒梔子涼膈滋陰丸二十一生地蔞仁枳實炒大力子加味竹葉湯二十二生地白芍地骨皮竹葉茯苓人參浮小麥蘆根清胃飲二十三葛根蘆根人參麥冬去心知母竹茹梔子蔥白黃芩湯二十四黃芩白芍甘草炙大棗犀角地黃湯二十五犀角生地白芍丹皮加味清胃散二十六生地當歸川連連翹青皮炒炭甘草炒術清肺飲二十七梔子黃芩知母麥冬去心桑皮烏梅黃連湯二十八川連側柏當歸香附炒阿膠為末米飲下衄血湯二十九側柏葉蒲黃炒白芍黃耆炙為末米糊丸清湯下益元散三十滑石煅生甘草辰砂清魂膏三十一藕汁生地汁童便酒沖服茅根湯三十二白茅根瞿麥車前子通草滑石煅甘草鯉魚石首魚石研末三黃熟艾湯三十三黃芩黃連黃柏艾醋炒熱方八附子湯一人參白朮炒茯苓白芍附子制理中湯二白朮炒炙甘草乾薑四順湯三當歸川芎白芍炒炮姜理陰煎四熟地當歸肉桂炙甘草乾薑胃關煎五熟地山藥白扁豆白朮炒炙甘草焦姜附子散六人參白朮炒炙甘草陳皮當歸丁香附子為末米飲調下附子理中湯七附子白朮甘草炙乾薑調中湯八甘草炙附子制肉桂和方四十四參橘飲一人參白朮炒甘草炙橘皮當歸白芍藿香香附制茯苓半夏茯苓湯二人參白朮炒茯苓炙甘草廣皮半夏白芍炒旋覆花桔梗半夏滾湯洗七次薑汁炒黃半夏動胎胎初結慮其辛燥易散也勿用為穩然惡阻非半夏不能止經云有故無殞不妨權用一二劑但不宜多用五六分至一錢而止香砂六君子湯三人參白朮炒茯苓炙甘草廣皮半夏木香砂仁竹葉安胎飲四生地當歸黃芩麥冬去心棗仁炒甘草炙人參陳皮竹葉竹茹姜棗痰竹瀝沖服逍遙散五白朮炒白茯苓當歸白芍炒柴胡薄荷分氣飲六香附制砂仁白朮炒茯苓當歸白芍炒黃芩鯉魚湯七白朮茯苓當歸白芍炒鯉魚一尾六七兩者煎服二陳湯八茯苓炙甘草陳皮半夏制五虎飲九杏仁去皮蘇梗木賊陳皮知母炒北五味桔梗甘草炙石膏不可多用蔞仁喘者重用小柴胡湯十柴胡黃芩炙甘草知母炒姜棗人參安胎和氣飲十一白朮炒陳皮白芍炒訶子煨去核甘草炙木香陳粳米生薑桑寄生散十二桑寄生當歸川芎川斷香附制阿膠人參白朮炒茯苓甘草炙生薑參蘇飲十三紫蘇陳皮前胡桔梗茯苓炙甘草葛根知母炒砂仁人參四物寄生湯十四熟地當歸川芎白芍炒桑寄生羌活五六分黃龍湯十五柴胡黃芩炙甘草知母炒人參姜棗紅香附蒙薑黃連丸十六乾薑泡川連砂仁阿膠白朮炒川芎乳香去油為末鹽梅醋浸搗米糊丸甘草湯調下歸涼節命散十七當歸白芍炒白朮炒白茯苓炙甘草麥冬去心黏米如有食積加砂仁穀芽白朮散十八白朮炒防風牡蠣煅平安散十九熟地甘草炙陳皮砂仁木香川芎生薑煨鹽六和湯二十人參茯苓炙甘草藿香杏仁木瓜陳皮砂仁姜棗人參白朮散二十一人參白朮茯苓炙甘草木香藿香乾葛保産萬全湯二十二人參當歸川芎桃仁炒姜炙甘草懷牛膝紅花酒炒肉桂大棗開骨膏二十三乳香一兩研端午日以豬心血和丸如雞豆大硃砂為衣每用一丸酒下生化湯二十四川芎當歸桃仁黑姜炙甘草保生無憂散二十五當歸白芍炒川芎血餘乳香木香炙甘草枳殼炒焦清魂散二十六人參川芎荊芥澤蘭甘草炙童便下濟陰丹二十七益母草連根拔起陰乾取葉八兩為末不犯鐵器當歸一兩赤芍六錢廣木香五錢為末蜜丸如彈子大每服一丸有熱童便下有風荊芥酒下如虛弱參湯下加味四物湯二十八熟地當歸白芍炒川芎白芷阿膠蒲黃小薊根砂雄丸二十九硃砂一錢雄黃一錢白茯苓三兩為末水丸薑湯下金狗脊散三十川斷地榆炒川芎金毛狗脊熟地當歸白芍炒白芷阿膠蒲黃炒空心只服一帖趁痛散三十一黃耆炙白朮炒當歸懷牛膝肉桂炙甘草獨活韭白生薑加減生化湯三十二川芎當歸甘草炙砂仁煨姜溫胃丁香湯三十三當歸白朮乾薑丁香人參陳皮炙甘草藿香前胡生薑石蓮散三十四石蓮子去皮白茯苓丁香為末米飲下生津益液湯三十五人參茯苓麥冬去心花粉炙甘草竹葉小麥大棗生化六和湯三十六當歸川芎炒姜砂仁藿香陳皮茯苓生薑加參寧嗽生化湯三十七當歸川芎人參炙甘草杏仁去皮桑皮炙半夏制知母炒小調經湯三十八當歸赤芍肉桂沒藥去油琥珀細辛麝香為末姜酒調下大調經湯三十九茯神琥珀大黑豆炒紫蘇湯下加味生化湯四十人參黃耆炙當歸川芎麻黃根天麻荊芥炙甘草防風棗仁炒有痰加薑汁竹瀝大便閉加麻仁加味通幽散四十一川芎當歸肉蓯蓉洗炙甘草桃仁麻仁炒虛汗加人參黃耆麻黃根渴加人參麥冬北五味血塊痛加延胡索肉桂石子湯四十二豬腰子當歸白芍炒晚米香豉蔥鹽煮粥食之通乳湯四十三豬蹄通草川芎穿山甲炙甘草節二妙散四十四川柏炒蒼朮炒瀉方五澤瀉散一澤瀉炒桑皮炒赤茯苓通草炙甘草生薑枳殼炭少許四苓散二豬苓澤瀉白朮炒茯苓地膚子湯三地膚子車前子知母黃芩赤茯苓白芍炙甘草升麻炒枳殼炭少許通草胃苓湯四蒼朮炒厚朴制上二味宜炒焦不可多用以傷胎氣陳皮甘草炙豬苓澤瀉炒白朮炒茯苓五苓散五豬苓澤瀉白朮炒茯苓肉桂少許胎前備用良方三十五惡阻保生湯一人參白朮炒甘草炙烏梅香附制橘紅橘皮竹茹湯二橘皮竹茹半夏制茯苓五君子湯三人參白朮炙甘草廣皮煨姜子煩人參散四人參黃芩麥冬去心犀角地骨皮赤茯苓甘草當歸湯五當歸人參阿膠甘草蔥白連須黃連散六黃連末米飲下人參黃耆散七人參黃耆知母麥冬去心葛根茯苓甘草竹葉秦艽子氣腎著湯八白朮茯苓甘草杏仁乾薑防己湯九防己桑皮蘇梗赤茯苓木香子癇葛根湯十葛根人參甘草當歸貝母黃芩川芎防風桂皮二三分足矣黃蠟膏十一如牙關緊閉先將麻油溶化黃蠟搽牙然後進藥加味逍遙散十二白朮炒白茯苓當歸白芍柴胡薄荷黑山梔丹皮生地子嗽百合散十三紫菀麥冬去心桑皮桔梗甘草竹茹白蜜參蘇飲十四人參紫蘇陳皮前胡桔梗茯苓炙甘草葛根知母炒砂仁子瘧加減安胎飲十五人參白朮炒當歸黃芩藿香紫蘇烏梅青皮炒炭紅棗生薑又方十六人參白朮當歸黃芩柴胡薄荷葛根紫蘇藿香龜甲生薑大棗嘔不思食難治心腹痛竹茹丸十七竹茹一斤羊脂八兩蜜三兩煎每服棗核大三枚火龍散十八生地木香砂仁殼炒又方十九川楝子煨艾葉鹽水炒小茴炒腰脅痛大地黃丸二十熟地當歸烏梅蜜丸治骨髓熱痛內補湯二十一生地當歸川柏麻仁乳香沒藥黃芩木香歸膠飲二十二阿膠炙甘草當歸蔥白氣壅攻腰此可治之豬腎丸二十三豬腎一斤青鹽二錢蒸熟焙乾蜜丸空心服勝金散二十四陳皮吳茱萸骨碎補砂仁甘草炙鹽湯下二錢遍身兩脅刺痛脹滿此五臟不利氣血虛弱也惟此方可治又胃氣虛冷下逼小腸症若奔豚大便祕澀兩脅虛鳴腰痛如山亦宜此方溫中下氣下血阿膠散二十五阿膠生地二黃散二十六生地熟地千金方二十七生地一斤酒煮絞汁服如聖湯二十八鯉魚皮當歸川斷阿膠竹茹白芍炒川芎甘草炙子芩丸二十九條芩炒為末每服一錢以稱錘燒赤淬酒調下若脾胃虛者勿服又方三十雞肝三個酒煮帶酒食之傷寒白藥子膏三十一白藥子末雞子清調攤紙上如碗大貼於臍下干則溫潤之恐毒氣損胞以此治之又方三十二井底泥敷心下使胎不動傷胎奪命丸三十三肉桂桃仁丹皮赤芍茯苓淡醋湯下誤服毒食傷胎下血以此治之三物解毒湯三十四生甘草黑豆竹葉煎服又方三十五生白扁豆末米飲下古人治傷寒病邪毒攻胎致胎死腹中多用硝石水銀硇砂之類使化爛而出其餘傷胎而胎死腹中者慎勿用之産後備用良方十八難産龜殼散一龜板當歸川芎婦人頭髮燒炭生長過者佳湯下又方二伏龍肝末酒下一錢又方三兔毫敗筆頭一枚燒灰研藕汁一盞下之如神散四路上草鞋一雙取鼻梁洗淨燒灰童便酒下三錢又方五榆白皮煮汁服二升又方六黃牯牛干糞塗母腹上立出胞衣不下一方七陳久蓮蓬殼酒煎服之或荷葉炒香為末童便下惡露不止瑞蓮散八蓮房當歸川芎肉桂棕櫚燒鯉魚鱗燒酒調三錢心痛一方九荷葉燒研清湯下又方十桂心研膽汁丸酒下一錢不語一方十一人參蓮肉鮮石菖蒲水煎見鬼一方十二益母草汁地黃汁童便略煎五六沸入雞子清調服渴一方十三蓮子中青心生研細末米飲下二錢又方十四紅花子五合炒研水煎徐徐呷之治中風煩渴又方十五炒蒲黃井水調下二錢汗一方十六牡蠣粉小麥麩皮炒積聚一方十七童便地黃汁藕汁薑汁共煎濃汁酒下血瘕痛無定處又方十八生地海螵蛸研酒下
